//Firefox Allianz Default Settings

// disable default browser check
lockPref("browser.shell.checkDefaultBrowser", false);
lockPref("pref.general.disable_button.default_browser", true);
lockPref("browser.startup.homepage_override.mstone", "ignore");
lockPref("browser.EULA.override", true);
// enable application updates
lockPref("app.update.enabled", true);
// disables the 'know your rights' button from displaying on first run 
lockPref("browser.rights.3.shown", true);
// disables the request to send performance data from displaying
lockPref("toolkit.telemetry.prompted", 2);
lockPref("toolkit.telemetry.rejected", true);
// disables Firefox health report service and data upload
lockPref("datareporting.healthreport.service.enabled", false);
lockPref("datareporting.healthreport.service.firstRun", false);
lockPref("datareporting.healthreport.uploadEnabled", false);

// disable after update/setup addon compatibility check
// lockPref("extensions.checkCompatibility.140.0", false);

// Don't show Windows 10 splash screen on first run
lockPref("browser.usedOnWindows10", true);

// Disable themes
lockPref("config.lockdown.disable_themes", true);

// set Firefox Default homepage
defaultPref("browser.startup.homepage","about:blank");
// set Firefox to start with previous tabs restored
defaultPref("browser.startup.page", 3);
defaultPref("browser.sessionstore.resume_from_crash", true);
// set option to use system default proxy settings
pref("network.proxy.type", 5);
// set Proxy settings
pref("network.proxy.autoconfig_url","http://pacfile.allianz/insurance.pac");
// use no Proxy on
pref("network.proxy.no_proxies_on","localhost, 127.0.0.1, 10., .de.awin, .allianz");
// Disable preferences synch
pref("services.sync.prefs.sync.extensions.update.enabled", false);

// Cache Settings limit to 10MB
defaultPref("browser.cache.disk.capacity", 10000);

// Disable Add-ons compatibility checking
clearPref("extensions.lastAppVersion"); 

// Disable Mozilla Firefox Hello chat feature
lockPref("loop.throttled", true);

// Search Tab
// Defaul Search Engine
pref("browser.search.defaultenginename","Google");
// Hide other search results
pref("browser.search.hiddenOneOffs","Yahoo,eBay,Amazon.com,IMDb,Twitter,DuckDuckGo");

// Content Tab
pref("dom.disable_open_during_load", false);

// Privacy Tab
// Disable form fill and clear on FF shutdown downloads, formdata, cache, passwords and sessions
pref("browser.formfill.enable", false);
pref("browser.download.manager.retention", 0);
pref("privacy.sanitize.sanitizeOnShutdown", true);
pref("privacy.item.history", false);
pref("privacy.item.downloads", true);
pref("privacy.item.formdata", true);
pref("privacy.item.cache", true);
pref("privacy.item.cookies", false);
pref("privacy.item.passwords", true);
pref("privacy.item.sessions", true);
pref("privacy.sanitize.promptOnSanitize", false);
// Accept Only 1st Party Cookies
pref("network.cookie.cookieBehavior", 1);
// Disallow Credential Storage
pref("browser.formfill.Enable", false);
// Disable Tab Preview
pref("browser.newtab.url", "about:blank");
pref("browser.newtabpage.enabled", false);
pref("services.sync.prefs.sync.browser.newtabpage.enabled", false);

// Security Tab
// Do not remember signons
pref("signon.rememberSignons", false);
// Prevent auto filling web forms
pref("signon.prefillForms", false);
// Disable SSL2
pref("security.enable_ssl2", false);
// Disable SSL3
pref("security.enable_ssl3", false);
// Enable TLS
pref("security.enable_tls", true);
// TLS 1.0 is the minimum supported encryption protocol
pref("security.tls.version.min", 1);
// Strong security setting
pref("general.useragent.security", "U");
// Scripting of plugins by untrusted scripts
pref("security.xpconnect.plugin.unrestricted", false);
// Enable Virus Scanning for Downloads 
pref("browser.download.manager.scanWhenDone", true);
// Safebrowsing - Disable web forgeries
pref("browser.safebrowsing.enabled", true);
// Allow Windows single sign-on for Microsoft, work, and school accounts
pref("network.http.windows-sso.enabled", true);

// Advanced Tab
// Enable automatic browser update
lockPref("app.update.auto", true);
lockPref("app.update.silent", true);
lockPref("app.update.service.enabled", true);
// Disable IPv6
pref("network.dns.disableIPv6", true);

// Dynamic Content Settings:
// Block Reported Web Forgeries
pref("browser.safebrowsing.enabled", true);
// Block Reported Attack Sites
pref("browser.safebrowsing.malware.enabled", true);

// Network Settings
// Enable SSPI Authentication
lockPref("network.auth.use-sspi", true);
// Use preferences set by operating system (e.g. proxies, accessibility)
lockPref("config.use_system_prefs", true);

// Deactivate Facebook integration ab FF 17.x
lockPref("social.active", false);
lockPref("social.enabled", false);
lockPref("social.sidebar.open", false);

// Deactivate Share functionality
lockPref("social.share.activationPanelEnabled", false);
lockPref("social.remote-install.enabled", false);

// Deactivate Pocket integration
lockPref("browser.toolbarbuttons.introduced.pocket-button", false);
lockPref("extensions.pocket.enabled", false);

// Deactivate Send/Screenshot integration
lockPref("extensions.screenshots.system-disabled", true);
lockPref("extensions.screenshots.disabled", true);

// Deactivate Firefox Heartbeat Feedback service
lockPref("browser.selfsupport.url", "");

// Deactivate the Firefox captive portal
pref("network.captive-portal-service.enabled", false);

// Deactivate the Firefox Translator
lockPref("browser.translations.enable", false);
lockPref("browser.translations.automaticallyPopup", false);
lockPref("browser.translations.panelShown", false);
lockPref("browser.translations.select.enable", false);

// Suppress update notification UI

lockPref("app.update.showInstalledUI", false);
// EXPERIMENTAL: search and import enterprise root CAs from Windows
pref("security.enterprise_roots.enabled", true);

// Disable Crash Reporter Service
Components.classes["@mozilla.org/toolkit/crash-reporter;1"].getService(Components.interfaces.nsICrashReporter).submitReports = false;